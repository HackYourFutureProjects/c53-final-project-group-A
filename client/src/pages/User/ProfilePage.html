<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - JobFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Header/Navigation -->
    <header class="bg-gray-200 shadow-sm">
      <nav class="max-w-7xl mx-auto px-6 py-5">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-3">
            <div class="text-xl font-bold text-gray-800">LOGO</div>
            <div class="text-xl text-gray-700">JobFinder</div>
          </div>
          <div class="flex items-center space-x-8">
            <a href="#" class="text-gray-700 hover:text-gray-900">Home</a>
            <a href="#" class="text-gray-700 hover:text-gray-900">About</a>
            <a href="#" class="text-gray-700 hover:text-gray-900"
              >Job listings</a
            >
            <a href="#" class="text-gray-700 hover:text-gray-900"
              >Favorite jobs</a
            >
            <a href="#" class="text-gray-700 hover:text-gray-900">Profile</a>
            <a href="#" class="text-gray-700 hover:text-gray-900"
              >Login/Logout</a
            >
          </div>
        </div>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-3xl mx-auto px-6 py-12 w-full">
      <!-- Page Title -->
      <h1 class="text-2xl font-semibold text-center text-gray-900 mb-8">
        Profile
      </h1>

      <!-- Profile Section with Avatar and Name -->
      <div class="mb-8">
        <div class="flex items-start space-x-4">
          <div class="relative">
            <div
              class="w-20 h-20 bg-gray-300 rounded flex items-center justify-center flex-shrink-0"
            >
              <span class="text-gray-700 font-semibold text-lg">JV</span>
            </div>
            <button
              class="absolute bottom-0 right-0 w-6 h-6 bg-white border border-gray-300 rounded-full flex items-center justify-center hover:bg-gray-50"
            >
              <svg
                class="w-3 h-3 text-gray-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                ></path>
              </svg>
            </button>
          </div>
          <div class="flex-grow">
            <label class="block text-sm font-medium text-gray-900 mb-2"
              >Name</label
            >
            <input
              type="text"
              value="Jan de Vries"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
        </div>
      </div>

      <hr class="border-gray-300 mb-8" />

      <!-- Settings Section -->
      <h2 class="text-lg font-semibold text-gray-900 mb-6">Settings</h2>

      <!-- Address -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-900 mb-3"
          >Address</label
        >

        <div class="grid grid-cols-2 gap-4 mb-3">
          <div>
            <label class="block text-xs text-gray-600 mb-1">Province</label>
            <input
              type="text"
              value="Noord-Holland"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label class="block text-xs text-gray-600 mb-1">City</label>
            <input
              type="text"
              value="Amsterdam"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs text-gray-600 mb-1">Street</label>
            <input
              type="text"
              value="Keizersgracht"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label class="block text-xs text-gray-600 mb-1">House no.</label>
            <input
              type="text"
              value="123"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
        </div>
      </div>

      <!-- Skills -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-900 mb-2"
          >Skills</label
        >
        <div class="flex gap-3 mb-3">
          <input
            id="skillInput"
            type="text"
            placeholder="e.g. React, TypeScript, Docker"
            class="flex-grow px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <button
            id="addSkillBtn"
            class="bg-blue-500 text-white px-5 py-2 rounded hover:bg-blue-600 transition"
          >
            Add
          </button>
        </div>

        <!-- Skills List -->
        <div
          id="skillsList"
          class="flex flex-wrap gap-2 min-h-[60px] border border-gray-300 rounded p-3 bg-gray-50"
        ></div>
      </div>

      <!-- Provinces -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-900 mb-3"
          >Provinces</label
        >
        <div class="border border-gray-300 rounded p-4">
          <div class="grid grid-cols-2 gap-x-8 gap-y-2">
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="form-checkbox" />
              <span class="text-sm text-gray-700">Groningen</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="form-checkbox" />
              <span class="text-sm text-gray-700">Friesland</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="form-checkbox" />
              <span class="text-sm text-gray-700">Drenthe</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="form-checkbox" />
              <span class="text-sm text-gray-700">Overijssel</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" checked class="form-checkbox" />
              <span class="text-sm text-gray-700">Flevoland</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="form-checkbox" />
              <span class="text-sm text-gray-700">Gelderland</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" checked class="form-checkbox" />
              <span class="text-sm text-gray-700">Utrecht</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" checked class="form-checkbox" />
              <span class="text-sm text-gray-700">Noord-Holland</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" checked class="form-checkbox" />
              <span class="text-sm text-gray-700">Zuid-Holland</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="form-checkbox" />
              <span class="text-sm text-gray-700">Zeeland</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="form-checkbox" />
              <span class="text-sm text-gray-700">Noord-Brabant</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="form-checkbox" />
              <span class="text-sm text-gray-700">Limburg</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Travel Time -->

      <div class="mb-8">
        <label class="block text-sm font-medium text-gray-900 mb-2"
          >Travel time</label
        >
        <div class="flex items-center space-x-3">
          <input
            type="text"
            value="01"
            class="w-16 px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-center"
          />
          <span class="text-gray-700">hh :</span>
          <input
            type="text"
            value="30"
            class="w-16 px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-center"
          />
          <span class="text-gray-700">mm</span>
        </div>
      </div>

      <!-- Save Button -->
      <div class="flex justify-end mb-8">
        <button
          class="px-8 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400 transition font-medium"
        >
          Save
        </button>
      </div>

      <hr class="border-gray-300 mb-8" />

      <!-- Profile Management Section -->
      <h2 class="text-lg font-semibold text-gray-900 mb-6">
        Profile management
      </h2>

      <div class="flex items-start justify-between">
        <div>
          <h3 class="font-medium text-gray-900 mb-1">Delete Profile</h3>
          <p class="text-sm text-gray-600">
            Permanently delete your account and data.
          </p>
        </div>
        <button
          class="px-6 py-2 bg-black text-white rounded hover:bg-gray-800 transition font-medium"
        >
          Delete Profile
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-200 py-8 mt-12">
      <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-xl text-gray-700">Footer</p>
      </div>
    </footer>

    <script>
      const skillInput = document.getElementById("skillInput");
      const addSkillBtn = document.getElementById("addSkillBtn");
      const skillsList = document.getElementById("skillsList");

      let skills = [
        "React",
        "TypeScript",
        "Node.js",
        "PostgreSQL",
        "Docker",
        "AWS",
      ];

      // Initialize with existing skills
      function initializeSkills() {
        skills.forEach((skill) => {
          addSkillToDOM(skill);
        });
      }

      // Add skill to DOM
      function addSkillToDOM(skill) {
        const skillElement = document.createElement("div");
        skillElement.className =
          "inline-flex items-center bg-white border border-gray-300 rounded px-3 py-1.5 text-sm";
        skillElement.innerHTML = `
                <span class="text-gray-800 mr-2">${skill}</span>
                <button class="text-gray-500 hover:text-red-600 transition" onclick="removeSkill('${skill}', this)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            `;
        skillsList.appendChild(skillElement);
      }

      // Add skill function
      function addSkill() {
        const skill = skillInput.value.trim();

        if (skill === "") return;

        // Check if skill already exists
        if (skills.includes(skill)) {
          alert("This skill is already added!");
          return;
        }

        // Add to array
        skills.push(skill);

        // Add to DOM
        addSkillToDOM(skill);

        // Clear input
        skillInput.value = "";
        skillInput.focus();
      }

      // Remove skill function
      window.removeSkill = function (skill, button) {
        // Remove from array
        skills = skills.filter((s) => s !== skill);

        // Remove from DOM
        button.parentElement.remove();
      };

      // Add skill on button click
      addSkillBtn.addEventListener("click", addSkill);

      // Add skill on Enter key
      skillInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          addSkill();
        }
      });

      // Initialize skills on page load
      initializeSkills();
    </script>
  </body>
</html>
