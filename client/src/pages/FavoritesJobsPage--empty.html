<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites Jobs - JobFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Header/Navigation -->
    <header class="bg-gray-200 shadow-sm">
        <nav class="max-w-7xl mx-auto px-6 py-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="text-xl font-bold text-gray-800">LOGO</div>
                    <div class="text-xl text-gray-700">JobFinder</div>
                </div>
                <div class="flex items-center space-x-8">
                    <a href="#" class="text-gray-700 hover:text-gray-900">Home</a>
                    <a href="#" class="text-gray-700 hover:text-gray-900">About</a>
                    <a href="#" class="text-gray-700 hover:text-gray-900">Job listings</a>
                    <a href="#" class="text-gray-700 hover:text-gray-900">Favorites jobs</a>
                    <a href="#" class="text-gray-700 hover:text-gray-900">Profile</a>
                    <a href="#" class="text-gray-700 hover:text-gray-900">Login/Logout</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-6 py-12 w-full">
        <!-- Page Title -->
        <h1 class="text-3xl font-semibold text-center text-gray-900 mb-12">Favorites jobs</h1>

        <!-- Empty State -->
        <div class="max-w-2xl mx-auto text-left">
            <p class="text-xl text-gray-900 mb-4">Your favorites is empty.</p>
            <p class="text-lg text-gray-700">Add some jobs to your favorites</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-200 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-xl text-gray-700">Footer</p>
        </div>
    </footer>
</body>
</html>
